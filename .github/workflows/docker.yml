name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build backend image
      run: docker build -t nailus04/yourprime-backend:latest ./YourPrimeWebApp (1)/YourPrimeWebApp/YourPrime

    - name: Push backend image
      run: docker push nailus04/yourprime-backend:latest

    - name: Build frontend image
      run: docker build -t nailus04/yourprime-frontend:latest ./yourprime-ui/yourprime-ui

    - name: Push frontend image
      run: docker push nailus04/yourprime-frontend:latest
