name: Build and Push Docker Images

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------------- BACKEND ----------------
      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/yourprime-backend:latest ./YourPrimeWebApp/YourPrimeWebApp/YourPrime

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/yourprime-backend:latest

      # ---------------- FRONTEND ----------------
      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/yourprime-frontend:latest ./yourprime-ui/yourprime-ui

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/yourprime-frontend:latest
